name: Nicegram Scraper

on:
  schedule:
    - cron: '0 * * * *' # تشغيل عند بداية كل ساعة
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - run: pip install requests
      - run: python scraper.py
      - name: Commit files
        run: |
          git config --global user.name 'bot'
          git config --global user.email 'bot@bot.com'
          git add channels_data.csv last_cursor.txt
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update data" && git push)
